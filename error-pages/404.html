<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Page not found</title>
  <style>
    :root {
      --bg-start: #f8f2e8;
      --bg-end: #eadcc7;
      --panel: rgba(255, 255, 255, 0.86);
      --text: #201a16;
      --muted: #695e55;
      --accent: #b55a35;
      --border: rgba(32, 26, 22, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(181, 90, 53, 0.18), transparent 42%),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(100%, 760px);
      padding: 48px 40px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(53, 39, 27, 0.14);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.8rem, 8vw, 5rem);
      line-height: 0.95;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      main {
        padding: 34px 24px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">404 response</p>
    <h1>Page not found</h1>
    <p>This domain is configured, but the requested page is currently unavailable.</p>
    <p>If this should be online, the backing service may be down or redeploying.</p>
  </main>
</body>
</html>
